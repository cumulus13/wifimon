name: Release

on:
  push:
    branches: ["master", "dev"]
  # pull_request:
    # branches: ["master"]
  # push:
    # tags:
      # - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build release binaries ──────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: wifimon-linux-x86_64
            binary: wifimon

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: wifimon-linux-aarch64
            binary: wifimon
            use_cross: true

          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            artifact: wifimon-linux-armv7
            binary: wifimon
            use_cross: true

          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: wifimon-macos-x86_64
            binary: wifimon

          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: wifimon-macos-aarch64
            binary: wifimon

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: wifimon-windows-x86_64
            binary: wifimon.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          cd ../../..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ../../../${{ matrix.artifact }}.zip
          cd ../../..
          (Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256).Hash |
            Out-File ${{ matrix.artifact }}.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: wifimon ${{ github.ref_name }}
          body: |
            ## wifimon ${{ github.ref_name }}

            ### Install

            **Linux / macOS**
            ```bash
            curl -sSf https://raw.githubusercontent.com/cumulus13/wifimon/main/install.sh | bash
            ```
            **Cargo**
            ```bash
            cargo install wifimon
            ```
            See [README](https://github.com/cumulus13/wifimon#readme) for full documentation.
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Publish to crates.io ────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
